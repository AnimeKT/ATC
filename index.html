<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaergsty Hub - Comunidad</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="cambiarVista('catalogo')">
            <h1>Kaergsty <span>Hub</span></h1>
        </div>
        
        <div class="search-bar" id="barra-busqueda">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscador" placeholder="Buscar anime...">
        </div>
        
        <div class="user-actions">
            <button id="btn-admin-view" class="btn-login" style="display: none;" onclick="prepararNuevoRegistro()">
                <i class="fa-solid fa-plus"></i> <span class="hide-mobile">Añadir Obra</span>
            </button>
            <button id="btn-auth" class="btn-login" onclick="abrirModalAuth()">
                <i class="fa-solid fa-user"></i> <span class="hide-mobile">Ingresar</span>
            </button>
        </div>
    </header>

    <div id="vista-catalogo">
        <nav class="filtros-container">
            <button class="btn-filtro active" onclick="filtrar('Todos', event)"><i class="fa-solid fa-list"></i> Todos</button>
            <button class="btn-filtro" onclick="filtrar('En emisión', event)"><i class="fa-solid fa-play"></i> En Emisión</button>
            <button class="btn-filtro" onclick="filtrar('Finalizado', event)"><i class="fa-solid fa-check-circle"></i> Finalizado</button>
            <button class="btn-filtro"><i class="fa-solid fa-tags"></i> Categorías</button>
            <button class="btn-filtro"><i class="fa-solid fa-heart"></i> Favoritos</button>
        </nav>

        <main class="contenedor">
            <h2 class="titulo-seccion">Catálogo Global</h2>
            <div id="grid-obras" class="grid-animes">
                </div>
        </main>
    </div>

    <div id="vista-detalle" style="display: none;">
        <button onclick="cambiarVista('catalogo')" class="btn-volver btn-flotante"><i class="fa-solid fa-arrow-left"></i> Volver</button>
        
        <div class="detalle-banner">
            <img id="det-banner" src="" alt="Banner">
            <div class="detalle-banner-overlay"></div>
        </div>
        
        <main class="contenedor contenedor-detalle">
            <div class="detalle-header">
                <img id="det-portada" class="detalle-portada" src="" alt="Portada">
                <div class="detalle-titulos">
                    <h2 id="det-titulo"></h2>
                    <p id="det-nombres-alt" class="text-muted"></p>
                    <div class="detalle-tags" id="det-tags"></div>
                </div>
            </div>
            
            <div class="detalle-grid">
                <div class="detalle-main-info">
                    <h3>Sinopsis</h3>
                    <p id="det-sinopsis"></p> <div id="admin-options-detalle" style="margin-top: 20px;"></div>

                    <h3 class="titulo-temporadas">Temporadas y Episodios</h3>
                    <div id="det-temporadas" class="temporadas-list"></div>
                </div>
                
                <div class="detalle-sidebar">
                    <div class="info-item"><span>Estado:</span> <strong id="det-estado"></strong></div>
                    <div class="info-item"><span>Tipo:</span> <strong id="det-tipo"></strong></div>
                    <div class="info-item"><span>Estudio:</span> <strong id="det-estudio"></strong></div>
                    <div class="info-item"><span>Origen:</span> <strong id="det-origen"></strong></div>
                    <div class="info-item"><span>Día emisión:</span> <strong id="det-dia"></strong></div>
                    <div class="info-item"><span>Estreno:</span> <strong id="det-estreno"></strong></div>
                    <div class="info-item"><span>Autor:</span> <strong id="det-autor"></strong></div>
                </div>
            </div>
        </main>
    </div>

    <div id="vista-registro" style="display: none;">
        <main class="contenedor">
            <div class="header-registro">
                <button onclick="cambiarVista('catalogo')" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver al Catálogo</button>
                <h2 class="titulo-seccion"><i class="fa-solid fa-database"></i> Registrar Nueva Obra</h2>
            </div>

            <section class="admin-panel">
                <div class="form-grid-complex">
                    <div class="input-group">
                        <label>Título Principal</label>
                        <input type="text" id="in-titulo" placeholder="ej: Akane-banashi">
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select id="in-estado">
                            <option value="En emisión">En emisión</option>
                            <option value="Finalizado">Finalizado</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>URL Portada (Vertical)</label>
                        <input type="text" id="in-portada" placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>URL Banner (Horizontal)</label>
                        <input type="text" id="in-banner" placeholder="https://...">
                    </div>

                    <div class="input-group">
                        <label>Nombre en Japonés</label>
                        <input type="text" id="in-japones" placeholder="ej: あかね噺">
                    </div>
                    <div class="input-group">
                        <label>Nombre en Inglés</label>
                        <input type="text" id="in-ingles" placeholder="ej: Akane-banashi">
                    </div>

                    <div class="input-group">
                        <label>Géneros (separados por coma)</label>
                        <input type="text" id="in-generos" placeholder="ej: Drama, Shounen">
                    </div>
                    <div class="input-group">
                        <label>Autor / Creador</label>
                        <input type="text" id="in-autor" placeholder="ej: Yūki Suenaga">
                    </div>
                    <div class="input-group">
                        <label>Estudio de Animación</label>
                        <input type="text" id="in-estudio" placeholder="ej: ZEXCS">
                    </div>
                    <div class="input-group">
                        <label>Tipo</label>
                        <select id="in-tipo">
                            <option value="Serie">Serie</option>
                            <option value="Película">Película</option>
                            <option value="OVA">OVA</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Origen</label>
                        <select id="in-origen">
                            <option value="Manga">Manga</option>
                            <option value="Novela Ligera">Novela Ligera</option>
                            <option value="Original">Original</option>
                            <option value="Videojuego">Videojuego</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Fecha de Estreno</label>
                        <input type="text" id="in-estreno" placeholder="ej: 4 de Abril 2026">
                    </div>
                    <div class="input-group">
                        <label>Día de Emisión</label>
                        <input type="text" id="in-dia" placeholder="ej: Sábados">
                    </div>

                    <div class="input-group full-width">
                        <label><i class="fa-solid fa-folder-tree"></i> Contenido (Temporadas, Idiomas y Capítulos)</label>
                        <div id="builder-temporadas" style="display: flex; flex-direction: column; gap: 15px; margin-top: 5px;"></div>
                        
                        <button type="button" class="btn-filtro active" onclick="agregarTemporadaUI()" style="margin-top: 10px; width: fit-content;">
                            <i class="fa-solid fa-plus"></i> Añadir Nueva Sección / Temporada
                        </button>
                    </div>

                    <button id="btn-publicar" onclick="ejecutarRegistro()" class="btn-enviar full-width">Publicar en el Hub</button>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-auth" class="modal-oculto">
        <div class="modal-contenido modal-auth-box">
            <button class="btn-cerrar" onclick="cerrarModalAuth()"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="margin-bottom: 5px; text-align: center; color: #fff;">Acceso al Hub</h2>
            <p style="text-align: center; color: #a1a1aa; font-size: 13px; margin-bottom: 20px;">Tu cuenta de Telegram se detectará automáticamente.</p>
            <div class="form-group" style="grid-template-columns: 1fr;">
                <input type="password" id="auth-password" placeholder="Ingresa tu contraseña" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #27272a; background-color: #0f0f11; color: #fff; outline: none; transition: 0.3s;">
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="iniciarSesion()" class="btn-enviar" style="flex: 1; margin-top: 0;">Entrar</button>
                    <button onclick="registrarUsuario()" class="btn-filtro active" style="flex: 1; justify-content: center; height: 100%;">Vincular Clave</button>
                </div>
                <p id="auth-mensaje" style="color: #ef4444; text-align: center; font-size: 14px; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
