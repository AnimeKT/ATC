<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo Anime - Comunidad</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="cambiarVista('catalogo')">
            <h1>Anime<span>Hub</span></h1>
        </div>
        
        <div class="search-bar" id="barra-busqueda">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscador" placeholder="Buscar anime...">
        </div>
        
        <div class="user-actions">
            <button id="btn-admin-view" class="btn-login" style="display: none;" onclick="prepararNuevoRegistro()">
                <i class="fa-solid fa-plus"></i> <span class="hide-mobile">Añadir</span>
            </button>
            <button id="btn-auth" class="btn-login">
                <i class="fa-solid fa-user"></i> <span class="hide-mobile">Ingresar</span>
            </button>
        </div>
    </header>

    <div id="vista-catalogo">
        <nav class="filtros-container">
            <button class="btn-filtro active" onclick="filtrar('Todos', event)"><i class="fa-solid fa-list"></i> Todos</button>
            <button class="btn-filtro" onclick="filtrar('En emisión', event)"><i class="fa-solid fa-play"></i> Emisión</button>
            <button class="btn-filtro" onclick="filtrar('Finalizado', event)"><i class="fa-solid fa-check-circle"></i> Finalizados</button>
            <button class="btn-filtro" onclick="filtrar('Favoritos', event)"><i class="fa-solid fa-heart"></i> Favoritos</button>
            <button class="btn-filtro"><i class="fa-solid fa-tags"></i> Géneros</button>
        </nav>

        <main class="contenedor">
            <h2 class="titulo-seccion">Catálogo Global</h2>
            <div id="grid-obras" class="grid-animes">
                </div>
        </main>
    </div>

    <div id="vista-detalle" style="display: none;">

        <button id="btn-edit-serie" class="btn-editar" onclick="prepararEdicionDesdeDetalle()" style="display: none; z-index: 100;">
            <i class="fa-solid fa-pencil"></i>
        </button>

        <div class="detalle-banner">
            <img id="det-banner" src="" alt="Banner">
            <div class="detalle-banner-overlay"></div>
        </div>
        
        <main class="contenedor contenedor-detalle">
            <div class="detalle-header">
                <img id="det-portada" class="detalle-portada" src="" alt="Portada">
                <div class="detalle-titulos">
                    <h2 id="det-titulo"></h2>
                    <p id="det-nombres-alt" class="text-muted"></p>
                    <button id="det-favorito" type="button" class="btn-favorito" onclick="toggleFavorito()">
                        <i class="fa-regular fa-star"></i>
                        <span>Guardar</span>
                    </button>
                    <div class="detalle-tags" id="det-tags"></div>
                </div>
            </div>
            
            <div class="detalle-grid">
                <div class="detalle-main-info">
                    <h3>Sinopsis</h3>
                    <p id="det-sinopsis"></p> 

                    <h3 class="titulo-temporadas" style="margin-top: 25px;">Contenido Disponible</h3>
                    <div id="det-temporadas" class="temporadas-list"></div>
                </div>
                
                <div class="detalle-sidebar">
                    <div class="info-item"><span>Estado:</span> <strong id="det-estado"></strong></div>
                    <div class="info-item"><span>Tipo:</span> <strong id="det-tipo"></strong></div>
                    <div class="info-item"><span>Estudio:</span> <strong id="det-estudio"></strong></div>
                    <div class="info-item"><span>Origen:</span> <strong id="det-origen"></strong></div>
                    <div class="info-item"><span>Emisión:</span> <strong id="det-dia"></strong></div>
                    <div class="info-item"><span>Estreno:</span> <strong id="det-estreno"></strong></div>
                    <div class="info-item"><span>Autor:</span> <strong id="det-autor"></strong></div>
                </div>
            </div>
        </main>
    </div>

    <section id="vista-registro" style="display: none;">
        <div class="header-fijo">
            <h2 id="titulo-registro-header">Editor</h2>
            <button id="btn-publicar" class="btn-guardar-principal" onclick="ejecutarRegistro()">
                Publicar
            </button>
        </div>

        <div class="contenedor-formulario">
            <div class="form-seccion">
                <h3><i class="fa-solid fa-circle-info"></i> Información General</h3>
                <div class="input-group">
                    <label>Título Principal</label>
                    <input type="text" id="in-titulo" placeholder="Ej: Solo Leveling">
                </div>

                <div class="grid-2-col">
                    <div class="input-group">
                        <label>Nombre Japonés</label>
                        <input type="text" id="in-japones" placeholder="Japonés">
                    </div>
                    <div class="input-group">
                        <label>Nombre Inglés</label>
                        <input type="text" id="in-ingles" placeholder="Inglés">
                    </div>
                </div> <div class="input-group full-width">
                    <label>Sinopsis</label>
                    <textarea id="in-sinopsis" placeholder="Resumen de la trama..." rows="4"></textarea>
                </div> 

                <div class="grid-2-col">
                    <div class="input-group">
                        <label>Estado</label>
                        <select id="in-estado">
                            <option value="En emisión">En emisión</option>
                            <option value="Finalizado">Finalizado</option>
                            <option value="Próximamente">Próximamente</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Tipo</label>
                        <select id="in-tipo">
                            <option value="TV">TV</option>
                            <option value="Película">Película</option>
                            <option value="OVA">OVA</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2-col">
                    <div class="input-group">
                        <label>Estudio</label>
                        <input type="text" id="in-estudio" placeholder="Ej: MAPPA">
                    </div>
                    <div class="input-group">
                        <label>Autor</label>
                        <input type="text" id="in-autor" placeholder="Nombre del autor">
                    </div>
                    <div class="input-group">
                        <label>Origen</label>
                        <input type="text" id="in-autor" placeholder="Ej:Manga">
                    </div>
                    <div class="input-group">
                        <label>Estreno</label>
                        <input type="text" id="in-autor" placeholder="Ej:4 de Abril 2026">
                    </div>
                    <div class="input-group">
                        <label>Emisión</label>
                        <input type="text" id="in-autor" placeholder="Ej:Sabado">
                    </div>
                    
                </div>

                
            </div>

            <div class="form-seccion">
                <h3><i class="fa-solid fa-image"></i> Multimedia</h3>
                <div class="input-group">
                    <label>URL Portada (Vertical)</label>
                    <input type="text" id="in-portada" placeholder="https://...">
                </div>
                <div class="input-group">
                    <label>URL Banner (Horizontal)</label>
                    <input type="text" id="in-banner" placeholder="https://...">
                </div>
            </div>

            <div class="form-seccion">
                <div class="header-flex">
                    <h3><i class="fa-solid fa-list-ol"></i> Temporadas y Enlaces</h3>
                    <button type="button" class="btn-add-seccion" onclick="agregarSeccionUI()">
                        <i class="fa-solid fa-plus"></i> Añadir Sección
                    </button>
                </div>
                <div id="builder-temporadas">
                    </div>
            </div>
        </div>
    </section>

    <div id="modal-auth" class="modal-oculto">
        <div class="modal-contenido modal-auth-box">
            <button class="btn-cerrar" onclick="cerrarModalAuth()"><i class="fa-solid fa-xmark"></i></button>
            <h2>Crea tu Cuenta</h2>
            <p style="text-align: center; color: #a1a1aa; font-size: 13px; margin-bottom: 20px;">Guarda tu contraseña en un lugar seguro</p>
            
            <div class="form-group">
                <input type="password" id="auth-password" placeholder="Ingresa tu contraseña">
                <div class="auth-buttons-row">
                    <button onclick="iniciarSesion()" class="btn-enviar">Entrar</button>
                    <button onclick="registrarUsuario()" class="btn-vincular">Registrar Contraseña</button>
                </div>
                <p id="auth-mensaje"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
